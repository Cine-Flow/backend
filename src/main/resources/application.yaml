spring:
  application:
    name: cineflow

  datasource:
    url: jdbc:postgresql://localhost:5432/cineflow
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    ignore-migration-patterns: "*:missing"

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

api:
  prefix: /api/v1

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

auth:
  token:
    jwtSecret: ${JWT_SECRET:defaultSecretKeyForDevelopment23423423423afawpehewarwtfs}
    accessExpirationInMils: ${JWT_EXPIRATION:120000}
    refreshExpirationInDays: ${REFRESH_EXPIRATION_DAYS:7}

football:
  api:
    url: https://api.football-data.org
    token: ${FOOTBALL_API_TOKEN:a89e7a27090c4fe790e3d618f1bc6009}
